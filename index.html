<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="IxsDR4tozIcqsH-LhRPSdwbxxn89K4uVjUdlxLc4W4A" />
    <title>Shobhit Awasthi | Portfolio</title>
    <meta name="description" content="Portfolio website for Shobhit Awasthi" />
    <link id="dynamic-favicon" rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23000000'/%3E%3C/svg%3E" />
    <script>
      (function() {
        const updateFavicon = () => {
          const theme = document.documentElement.getAttribute('data-theme') || 'light';
          const color = theme === 'dark' ? '%23ffffff' : '%23000000';
          const link = document.getElementById('dynamic-favicon');
          if (link) {
            link.href = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='${color}'/%3E%3C/svg%3E`;
          }
        };

        updateFavicon();

        const observer = new MutationObserver((mutations) => {
          mutations.forEach((mutation) => {
            if (mutation.attributeName === 'data-theme') {
              updateFavicon();
            }
          });
        });
        observer.observe(document.documentElement, { attributes: true });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
